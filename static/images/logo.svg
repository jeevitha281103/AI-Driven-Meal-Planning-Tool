<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff7b25"/>
      <stop offset="100%" stop-color="#ff5722"/>
    </linearGradient>
  </defs>
  <!-- Plate icon -->
  <circle cx="28" cy="30" r="20" fill="none" stroke="#ff7b25" stroke-width="3"/>
  <circle cx="28" cy="30" r="7" fill="#ff7b25"/>
  <!-- Fork -->
  <line x1="40" y1="18" x2="48" y2="10" stroke="#ff7b25" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="40" y1="22" x2="50" y2="18" stroke="#ff7b25" stroke-width="2" stroke-linecap="round"/>
  <line x1="40" y1="26" x2="50" y2="26" stroke="#ff7b25" stroke-width="2" stroke-linecap="round"/>
  <!-- Knife -->
  <line x1="20" y1="45" x2="48" y2="50" stroke="#ff7b25" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Leaf -->
  <path d="M52 10 Q60 5 58 14 Q65 12 60 18" fill="#39D2B4" opacity="0.8"/>
  <!-- Brand text -->
  <text x="72" y="34" font-family="Outfit, Arial, sans-serif" font-size="22" font-weight="700" fill="#1f2937">Nutri</text>
  <text x="72" y="52" font-family="Outfit, Arial, sans-serif" font-size="12" font-weight="500" fill="#6b7280">Food Classifier</text>
  <text x="115" y="34" font-family="Outfit, Arial, sans-serif" font-size="22" font-weight="700" fill="url(#logoGrad)">Fit</text>
</svg>
