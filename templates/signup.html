{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center align-items-center min-vh-75 mt-5">
  <div class="col-md-6 col-lg-5">
    <div class="glass-panel text-center">
      <div class="mb-4">
        <a href="/" style="text-decoration:none;display:inline-flex;align-items:center;gap:0.6rem;">
          <i class="fa-solid fa-shrimp" style="color:#ff7b25;font-size:3.5rem;"></i>
          <span style="font-size:3rem;font-weight:800;color:#1f2937;letter-spacing:-0.5px;">Nutri</span><span style="font-size:3rem;font-weight:800;color:#ff7b25;letter-spacing:-0.5px;">Fit</span>
        </a>
        <h2 class="text-dark mb-2">Create Account</h2>
        <p class="text-muted">Register to start your personalized diet plan</p>
      </div>

      {% if error %}
      <div class="alert alert-danger py-2 px-3 rounded-3 text-start mb-3" style="font-size: 0.9rem;">
        <i class="fa-solid fa-triangle-exclamation me-2"></i> {{ error }}
      </div>
      {% endif %}

      <form action="/signup" method="POST">
        <div class="row">
          <div class="col-md-6 mb-3 text-start">
            <label class="form-label text-muted small ms-1">Username</label>
            <div class="input-group">
              <span class="input-group-text bg-transparent border-end-0 border-light"><i class="fa-solid fa-at text-muted"></i></span>
              <input type="text" name="user" class="form-control border-start-0 ps-0" placeholder="Username" required autofocus>
            </div>
          </div>
          <div class="col-md-6 mb-3 text-start">
            <label class="form-label text-muted small ms-1">Name</label>
            <div class="input-group">
              <span class="input-group-text bg-transparent border-end-0 border-light"><i class="fa-solid fa-user text-muted"></i></span>
              <input type="text" name="name" class="form-control border-start-0 ps-0" placeholder="Full Name" required>
            </div>
          </div>
        </div>

        <div class="row">
          <div class="col-md-6 mb-3 text-start">
            <label class="form-label text-muted small ms-1">Email</label>
            <div class="input-group">
              <span class="input-group-text bg-transparent border-end-0 border-light"><i class="fa-solid fa-envelope text-muted"></i></span>
              <input type="email" name="email" class="form-control border-start-0 ps-0" placeholder="Email" required>
            </div>
          </div>
          <div class="col-md-6 mb-3 text-start">
            <label class="form-label text-muted small ms-1">Mobile Number</label>
            <div class="input-group">
              <span class="input-group-text bg-transparent border-end-0 border-light"><i class="fa-solid fa-phone text-muted"></i></span>
              <input type="tel" name="mobile" class="form-control border-start-0 ps-0" placeholder="Mobile" required>
            </div>
          </div>
        </div>

        <div class="mb-4 text-start">
          <label class="form-label text-muted small ms-1">Password</label>
          <div class="input-group">
            <span class="input-group-text bg-transparent border-end-0 border-light"><i class="fa-solid fa-lock text-muted"></i></span>
            <input type="password" name="password" class="form-control border-start-0 ps-0" placeholder="Password" required>
          </div>
        </div>

        <button type="submit" class="btn btn-primary w-100 py-3 mb-3">
          SIGN UP <i class="fa-solid fa-user-check ms-2"></i>
        </button>
      </form>

      <p class="text-muted mb-0 small">
        Already have an account? <a href="/" class="text-primary text-decoration-none fw-bold">Sign In</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
