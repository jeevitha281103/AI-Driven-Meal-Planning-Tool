{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-8 col-lg-6">
    <div class="glass-panel">
      
      <!-- Title & Header -->
      <div class="text-center mb-4">
        <a href="/" style="text-decoration:none;display:block;margin-bottom:1rem;">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="80" height="80" style="display:block;margin:0 auto 0.3rem auto;" class="brand-icon">
            <circle cx="32" cy="32" r="30" fill="#e8f0fe"/>
            <path d="M44 20c-2 0-4 1-5 3l-3 6c-1 2-3 4-5 5l-7 3c-2 1-3 3-2 5 1 2 3 3 5 2l7-3c3-1 6-3 8-6l5-8c1-2 0-4-1-5-1-1-2-2-2-2z" fill="#0d6efd"/>
            <path d="M30 37l-5 7c-1 2 0 4 2 4s4-1 4-3l4-6" fill="none" stroke="#0d6efd" stroke-width="2" stroke-linecap="round"/>
            <circle cx="42" cy="21" r="2" fill="#fff"/>
          </svg>
          <span style="font-size:3.5rem;font-weight:800;letter-spacing:-1px;display:block;"><span style="color:#ff7b25;">Nutri</span><span style="color:#0d6efd;">Fit</span></span>
        </a>
        <h2 class="text-dark mb-2"><i class="fa-solid fa-calendar-day text-primary me-2"></i>Personalized Diet Planner</h2>
        <p class="text-muted">Enter your physical parameters to generate a customized 7-day meal plan</p>
      </div>

      <form method="POST">
        <div class="mb-3 text-start">
          <label for="plan_type" class="form-label text-muted small ms-1">Select Diet Plan Target</label>
          <div class="input-group">
            <span class="input-group-text bg-transparent border-end-0 border-light"><i class="fa-solid fa-seedling text-muted"></i></span>
            <select class="form-select border-start-0 ps-0" id="plan_type" name="plan_type" required>
              <option value="" disabled selected>Choose plan type...</option>
              <option value="normal">Normal Health / General Diet</option>
              <option value="diabetes">Diabetic Care / Low Glycemic Index</option>
            </select>
          </div>
        </div>

        <div class="row">
          <div class="col-md-6 mb-3 text-start">
            <label for="weight" class="form-label text-muted small ms-1">Weight (kg)</label>
            <div class="input-group">
              <span class="input-group-text bg-transparent border-end-0 border-light"><i class="fa-solid fa-weight-scale text-muted"></i></span>
              <input type="number" step="0.1" class="form-control border-start-0 ps-0" id="weight" name="weight" placeholder="e.g., 70" required>
            </div>
          </div>
          <div class="col-md-6 mb-4 text-start">
            <label for="height" class="form-label text-muted small ms-1">Height (cm)</label>
            <div class="input-group">
              <span class="input-group-text bg-transparent border-end-0 border-light"><i class="fa-solid fa-ruler-vertical text-muted"></i></span>
              <input type="number" step="0.1" class="form-control border-start-0 ps-0" id="height" name="height" placeholder="e.g., 175" required>
            </div>
          </div>
        </div>

        <button type="submit" class="btn btn-primary w-100 py-3">
          GENERATE MEAL PLAN <i class="fa-solid fa-wand-magic-sparkles ms-2"></i>
        </button>
      </form>

    </div>
  </div>
</div>
{% endblock %}
