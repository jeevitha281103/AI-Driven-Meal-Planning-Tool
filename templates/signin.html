{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center align-items-center min-vh-75 mt-5">
  <div class="col-md-5 col-lg-4">
    <div class="glass-panel text-center">
      <div class="mb-4">
        <a href="/" style="text-decoration:none;display:block;margin-bottom:1rem;">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="80" height="80" style="display:block;margin:0 auto 0.3rem auto;" class="brand-icon">
            <circle cx="32" cy="32" r="30" fill="#e8f0fe"/>
            <path d="M44 20c-2 0-4 1-5 3l-3 6c-1 2-3 4-5 5l-7 3c-2 1-3 3-2 5 1 2 3 3 5 2l7-3c3-1 6-3 8-6l5-8c1-2 0-4-1-5-1-1-2-2-2-2z" fill="#0d6efd"/>
            <path d="M30 37l-5 7c-1 2 0 4 2 4s4-1 4-3l4-6" fill="none" stroke="#0d6efd" stroke-width="2" stroke-linecap="round"/>
            <circle cx="42" cy="21" r="2" fill="#fff"/>
          </svg>
          <span style="font-size:3.5rem;font-weight:800;letter-spacing:-1px;display:block;"><span style="color:#ff7b25;">Nutri</span><span style="color:#0d6efd;">Fit</span></span>
        </a>
        <h2 class="text-dark mb-2">Welcome Back</h2>
        <p class="text-muted">Sign in to track your meals & calories</p>
      </div>

      {% if error %}
      <div class="alert alert-danger py-2 px-3 rounded-3 text-start mb-3" style="font-size: 0.9rem;">
        <i class="fa-solid fa-triangle-exclamation me-2"></i> {{ error }}
      </div>
      {% endif %}

      {% if message %}
      <div class="alert alert-success py-2 px-3 rounded-3 text-start mb-3" style="font-size: 0.9rem;">
        <i class="fa-solid fa-circle-check me-2"></i> {{ message }}
      </div>
      {% endif %}

      <form action="/signin" method="POST">
        <div class="mb-3 text-start">
          <label class="form-label text-muted small ms-1">Username</label>
          <div class="input-group">
            <span class="input-group-text bg-transparent border-end-0 border-light"><i class="fa-solid fa-user text-muted"></i></span>
            <input type="text" name="user" class="form-control border-start-0 ps-0" placeholder="Username" required autofocus>
          </div>
        </div>

        <div class="mb-4 text-start">
          <label class="form-label text-muted small ms-1">Password</label>
          <div class="input-group">
            <span class="input-group-text bg-transparent border-end-0 border-light"><i class="fa-solid fa-lock text-muted"></i></span>
            <input type="password" name="password" class="form-control border-start-0 ps-0" placeholder="Password" required>
          </div>
        </div>

        <button type="submit" class="btn btn-primary w-100 py-3 mb-3">
          SIGN IN <i class="fa-solid fa-right-to-bracket ms-2"></i>
        </button>
      </form>

      <p class="text-muted mb-0 small">
        Don't have an account? <a href="/logon" class="text-primary text-decoration-none fw-bold">Sign Up</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
