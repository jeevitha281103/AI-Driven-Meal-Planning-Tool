<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Dietary & Nutrient Intake Assistant</title>
    
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- FontAwesome for Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css?v=1" rel="stylesheet">
    
    <!-- Custom styling -->
    <link href="{{ url_for('static', filename='css/main.css') }}" rel="stylesheet" />
    
    <!-- jQuery (Needed for main.js) -->
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
  </head>

  <body>
    <!-- Premium Glassmorphism Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark custom-nav py-3">
      <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="/">
          <svg class="brand-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="28" height="28" style="color:#0d6efd;margin-right:0.5rem;"><path fill="currentColor" d="M64 32C28.7 32 0 60.7 0 96s28.7 64 64 64l1 0c3.7 88.9 77 160 167 160l56 0 0-192-24 0L88.8 128 64 128c-17.7 0-32-14.3-32-32s14.3-32 32-32l400 0c8.8 0 16-7.2 16-16s-7.2-16-16-16L64 32zM224 456c0 13.3 10.7 24 24 24l72 0 0-72.2-64.1-22.4c-12.5-4.4-26.2 2.2-30.6 14.7s2.2 26.2 14.7 30.6l4.5 1.6C233 433.9 224 443.9 224 456zm128 23.3c36.4-3.3 69.5-17.6 96.1-39.6l-86.5-34.6c-3 1.8-6.2 3.2-9.6 4.3l0 69.9zM472.6 415c24.6-30.3 39.4-68.9 39.4-111c0-12.3-1.3-24.3-3.7-35.9L382.8 355.1c.8 3.4 1.2 7 1.2 10.6c0 4.6-.7 9-1.9 13.1L472.6 415zM336 128l-16 0 0 192 18.3 0c9.9 0 19.1 3.2 26.6 8.5l133.5-92.4C471.8 172.6 409.1 128 336 128zM168 192a24 24 0 1 1 48 0 24 24 0 1 1 -48 0z"/></svg>
          <span class="brand-text"><span style="color:#ff7b25;">Nutri</span><span class="text-primary">Fit</span></span>
        </a>
        
        {% if session.get("user_email") %}
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto gap-2">
            <li class="nav-item">
              <a class="nav-link {% if request.path == '/prediction' %}active{% endif %}" href="/prediction">
                <i class="fa-solid fa-camera-retro me-1"></i> Prediction
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link {% if request.path == '/deit' %}active{% endif %}" href="/deit">
                <i class="fa-solid fa-calendar-day me-1"></i> Diet Plan
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link {% if request.path == '/viewrecipes' %}active{% endif %}" href="/viewrecipes">
                <i class="fa-solid fa-utensils me-1"></i> Recipes
              </a>
            </li>
            <li class="nav-item ms-lg-3">
              <a class="btn btn-outline-danger btn-sm px-3 rounded-pill" href="/logout">
                <i class="fa-solid fa-right-from-bracket me-1"></i> Logout
              </a>
            </li>
          </ul>
        </div>
        {% endif %}
      </div>
    </nav>

    <!-- Main Content Container with background glow effects -->
    <div class="bg-glow-1"></div>
    <div class="bg-glow-2"></div>
    
    <div class="container main-container py-4">
      <div id="content">
        {% block content %}{% endblock %}
      </div>
    </div>

    <!-- Bootstrap 5.3 Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  </body>
</html>
