<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Dietary & Nutrient Intake Assistant</title>
    
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- FontAwesome for Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css?v=1" rel="stylesheet">
    
    <!-- Custom styling -->
    <link href="{{ url_for('static', filename='css/main.css') }}" rel="stylesheet" />
    
    <!-- jQuery (Needed for main.js) -->
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
  </head>

  <body>
    <!-- Premium Glassmorphism Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark custom-nav py-3">
      <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="/">
          <i class="fa-solid fa-shrimp text-primary me-2 brand-icon"></i>
          <span class="brand-text"><span style="color:#ff7b25;">Nutri</span><span class="text-primary">Fit</span></span>
        </a>
        
        {% if session.get("user_email") %}
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto gap-2">
            <li class="nav-item">
              <a class="nav-link {% if request.path == '/prediction' %}active{% endif %}" href="/prediction">
                <i class="fa-solid fa-camera-retro me-1"></i> Prediction
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link {% if request.path == '/deit' %}active{% endif %}" href="/deit">
                <i class="fa-solid fa-calendar-day me-1"></i> Diet Plan
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link {% if request.path == '/viewrecipes' %}active{% endif %}" href="/viewrecipes">
                <i class="fa-solid fa-utensils me-1"></i> Recipes
              </a>
            </li>
            <li class="nav-item ms-lg-3">
              <a class="btn btn-outline-danger btn-sm px-3 rounded-pill" href="/logout">
                <i class="fa-solid fa-right-from-bracket me-1"></i> Logout
              </a>
            </li>
          </ul>
        </div>
        {% endif %}
      </div>
    </nav>

    <!-- Main Content Container with background glow effects -->
    <div class="bg-glow-1"></div>
    <div class="bg-glow-2"></div>
    
    <div class="container main-container py-4">
      <div id="content">
        {% block content %}{% endblock %}
      </div>
    </div>

    <!-- Bootstrap 5.3 Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  </body>
</html>
